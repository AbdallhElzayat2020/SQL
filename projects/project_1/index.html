<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login and Register</title>
    <link rel="stylesheet" href="style.css">

    <!-- Basic Icons -->
    <link href="https://cdn.boxicons.com/3.0.8/fonts/basic/boxicons.min.css" rel="stylesheet">
    <!-- Filled Icons -->
    <link href="https://cdn.boxicons.com/3.0.8/fonts/filled/boxicons-filled.min.css" rel="stylesheet">
    <!-- Brand Icons -->
    <link href="https://cdn.boxicons.com/3.0.8/fonts/brands/boxicons-brands.min.css" rel="stylesheet">
</head>

<body>
<!--header-->
<header>
    <a href="#" class="logo">LOGO</a>
    <nav>
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Services</a>
        <a href="#">Contact</a>
    </nav>

    <div class="user-auth" >
        <div class="profile-box">
            <div class="avatar-circle">A</div>
            <div class="dropdown">
                <a href="#">My Account</a>
                <a href="#">Logout</a>
            </div>
        </div>
        <button type="button" class="login-btn-modal" style="display: none">Login</button>
    </div>
</header>
<!--header-->

<!--Hero-->
<section>
    <h1>Hello!</h1>
</section>
<!--Hero-->

<!--Login Modal-->
<div class="auth-modal">

    <button type="button" class="close-btn-modal" ><i class="bxf bx-x"></i></button>

    <!--  Login Form  -->
    <div class="form-box login">
        <h2>Login</h2>
        <form action="#">
            <div class="input-box">
                <input name="email" type="email" placeholder="Email" required>
                <i class="bxf bx-envelope"></i>
            </div>

            <div class="input-box">
                <input name="password" type="password" placeholder="Password" required>
                <i class="bxf bx-lock"></i>
            </div>

            <button type="submit" name="login_btn" class="btn">Login</button>
            <p>Don't Have an account? <a href="#" class="register-link">Register</a></p>
        </form>
    </div>

    <!--  Register Form  -->
    <div class="form-box register">
        <h2>Register</h2>
        <form action="#">

            <div class="input-box">
                <input name="name" type="text" placeholder="Name" required>
                <i class="bxf bx-user"></i>
            </div>
            <div class="input-box">
                <input name="email" type="text" placeholder="Email" required>
                <i class="bxf bx-envelope"></i>
            </div>
            <div class="input-box">
                <input name="password" type="password" placeholder="Password" required>
                <i class="bxf bx-lock"></i>
            </div>

            <button type="submit" name="register_btn" class="btn">Register</button>
            <p>Already Have an account? <a href="#" class="login-link">Login</a></p>
        </form>
    </div>

</div>

<script src="./script.js"></script>

</body>

</html>
